<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display Example</title>
    <link rel="icon" type="image/png" sizes="32*32" href="E:/FILE/neeraj.jpg">
    <link rel="stylesheet" href="display.css">
</head>
<body>
    <h2>Block Example</h2>
    <div class="display-block">Block 1</div>
    <div class="display-block">Block 2</div>

    <h2>Inline Example</h2>
    <span class="display-inline">hello</span>
    <span class="display-inline">World</span>

    <h2>Inline-block Example</h2>
    <div class="display-inline-block box">1</div>
    <div class="display-inline-block box">2</div>

    <h2>Flex Example</h2>
    <div class="display-flex flex-box">
        <div>Home</div>
        <div>About</div>
        <div>Contact</div>
    </div>

    <h2>Grid Example</h2>
    <div class="display-grid grid-box">
        <div>1</div>
        <div>2</div>
        <div>3</div>
        <div>4</div>
    </div>

    <h2>Visibility Example</h2>
    <p>hello</p>
    <p class="visibility-hidden">hidden text</p>
    <p>World</p>
</body>
</html>
